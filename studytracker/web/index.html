<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTracker — Систематизируй обучение</title>

    <!-- Асинхронная загрузка CSS -->
    <link rel="preload" href="css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/style.css"></noscript>

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">

    <!-- Фавиконка -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <svg class="app-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    <polyline points="10 2 10 10 13 7 16 10 2"></polyline>
                </svg>
                <h1>StudyTracker</h1>
            </div>
            <p class="app-subtitle">Систематизируй материалы и отслеживай прогресс</p>
        </header>

        <main class="app-main">
            <form id="task-form" class="task-form" autocomplete="off">
                <input type="text" id="task-input" class="task-input" placeholder="Например: Посмотреть лекцию 4 по JavaScript..." maxlength="200" required>
                <button type="submit" class="btn btn-add">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Добавить
                </button>
            </form>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="active">Активные</button>
                <button class="filter-btn" data-filter="completed">Завершённые</button>
            </div>

            <ul id="task-list" class="task-list"></ul>

            <div id="empty-state" class="empty-state" hidden>
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                <p>Нет задач для отображения</p>
            </div>
        </main>

        <footer class="app-footer">
            <p>Сохраняйте прогресс локально. Данные не передаются на сервер.</p>
        </footer>
    </div>

    <script src="js/app.js" defer></script>
</body>
</html>
